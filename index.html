<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa en Tiempo Real</title>

<!-- MAPBOX -->
<link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>

<!-- FIREBASE (COMPAT) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
    body { margin: 0; }
    #map { width: 100%; height: 100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script>
/* =========================
   FIREBASE CONFIG (YA COMPLETO)
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyDGshJ8pIf7QY6KpLVyx8YPVt_9qsgnkdI",
  authDomain: "mapbox-296be.firebaseapp.com",
  databaseURL: "https://mapbox-296be-default-rtdb.firebaseio.com/",
  projectId: "mapbox-296be",
  storageBucket: "mapbox-296be.appspot.com",
  messagingSenderId: "849677247078",
  appId: "1:849677247078:web:bf2354cab4d957fdaac3a7"
};

/* INIT FIREBASE */
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

/* =========================
   MAPBOX (FALTA SOLO TOKEN)
========================= */
mapboxgl.accessToken = "pk.eyJ1IjoiYnZtb250ZXMiLCJhIjoiY21wYnVyZDdsMDFlMjJycGpqZHJ4Y3BueCJ9.qGxFe8-wMwt7Yz8O7kxGvQ";

let map;
let marcador;

/* INICIAR MAPA */
map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/streets-v11",
    center: [-68.15, -16.5],
    zoom: 12
});

/* =========================
   ESCUCHAR UBICACIONES
========================= */
const refUbicacion = database.ref("ubicaciones");

refUbicacion.on("child_added", (snap) => {

    const data = snap.val();
    if (!data) return;

    const lat = parseFloat(data.latitud);
    const lng = parseFloat(data.longitud);

    console.log("Ubicación recibida:", lat, lng);

    map.flyTo({
        center: [lng, lat],
        zoom: 17
    });

    if (marcador) marcador.remove();

    marcador = new mapboxgl.Marker({ color: "blue" })
        .setLngLat([lng, lat])
        .addTo(map);
});
</script>

</body>
</html>
